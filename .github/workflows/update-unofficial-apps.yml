name: Update Unofficial Apps

on:
  pull_request:
    paths:
      - 'src/unofficial-apps.json'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Run update task
        run: deno task update-unofficial-apps


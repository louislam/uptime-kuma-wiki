name: Update Unofficial Apps

on:
  push:
    branches:
      - master
    paths:
      - src/unofficial-apps.json
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.repository == 'louislam/uptime-kuma-wiki'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Run update task
        run: deno task update-unofficial-apps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add src/unofficial-apps.json
          git commit -m "chore: update src/unofficial-apps.json"
          git push origin master

